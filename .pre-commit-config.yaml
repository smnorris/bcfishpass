repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
  - repo: local
    hooks:
      - id: validate-plan-config
        name: Validate plan_config.yaml against schema
        language: python
        entry: python wcrp/scripts/validate_config.py
        files: wcrp/plan_config\.yaml$
        additional_dependencies: [jsonschema, pyyaml]

      - id: validate-plan-filter-clauses
        name: Validate plan filter clauses against database
        language: system
        entry: bash -c '$VIRTUAL_ENV/bin/python wcrp/scripts/validate_filter_clauses.py'
        files: wcrp/plan_config\.yaml$        